name: Metrics

on:
  # Atualiza o card 1x por dia
  schedule:
    - cron: "0 6 * * *"
  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:
  # Roda também a cada push na main (gera o SVG já no 1º commit)
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar card de linguagens
        uses: lowlighter/metrics@latest
        with:
          # Token pessoal (PAT) salvo em Settings > Secrets and variables > Actions
          token: ${{ secrets.METRICS_TOKEN }}
          user: educarvallho
          filename: metrics.languages.svg

          # Sem cabeçalho/base — apenas o bloco de linguagens
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo

          # Card de linguagens (equivalente ao top-langs compact/dark)
          plugin_languages: yes
          plugin_languages_layout: compact
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
